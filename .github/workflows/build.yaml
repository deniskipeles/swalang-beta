# ./.github/workflows/build.yaml
name: Package & Release Swalang

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v0.1.0 for releases
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  # This job runs on an Ubuntu runner and packages all platform binaries.
  package:
    name: Package Pre-compiled Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create Staging Directories
        run: |
          mkdir -p staging/swalang-windows-x86_64
          mkdir -p staging/swalang-linux-x86_64
          mkdir -p staging/swalang-android-arm64

      - name: Assemble Windows Package
        run: |
          echo "Assembling Windows package..."
          PACKAGE_DIR=staging/swalang-windows-x86_64
          cp builds/windows/amd64/mini/swalang.exe "$PACKAGE_DIR/"
          cp -r stdlib "$PACKAGE_DIR/"
          mkdir -p "$PACKAGE_DIR/bin"
          cp -r bin/windows-x86_64/* "$PACKAGE_DIR/bin/"

      - name: Assemble Linux Package
        run: |
          echo "Assembling Linux package..."
          PACKAGE_DIR=staging/swalang-linux-x86_64
          cp builds/linux/amd64/mini/swalang "$PACKAGE_DIR/"
          chmod +x "$PACKAGE_DIR/swalang"
          cp -r stdlib "$PACKAGE_DIR/"
          mkdir -p "$PACKAGE_DIR/bin"
          cp -r bin/linux-x86_64/* "$PACKAGE_DIR/bin/"

      - name: Assemble Android ARM64 Package
        run: |
          echo "Assembling Android package..."
          PACKAGE_DIR=staging/swalang-android-arm64
          cp builds/android/arm64/mini/swalang "$PACKAGE_DIR/swalang"
          chmod +x "$PACKAGE_DIR/swalang"
          cp -r stdlib "$PACKAGE_DIR/"
          mkdir -p "$PACKAGE_DIR/bin"
          cp -r bin/android/arm64-v8a/* "$PACKAGE_DIR/bin/"

      - name: Create Archives
        run: |
          echo "Creating final archives..."
          (cd staging/swalang-windows-x86_64 && zip -r ../swalang-windows-x86_64.zip .)
          (cd staging/swalang-linux-x86_64 && tar -czvf ../swalang-linux-x86_64.tar.gz .)
          (cd staging/swalang-android-arm64 && zip -r ../swalang-android-arm64.zip .)

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swalang-windows
          path: staging/swalang-windows-x86_64.zip

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swalang-linux
          path: staging/swalang-linux-x86_64.tar.gz

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swalang-android
          path: staging/swalang-android-arm64.zip

  # This job takes the packaged archives and creates a GitHub Release.
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write # This grants permission to create a release

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}