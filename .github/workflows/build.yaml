name: Build Swalang

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Swalang & Dependencies
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23.0'

    - name: Setup Node.js (For VSCode Extension)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential curl wget tar zip

    - name: Install Zig
      run: bash scripts/setup/install-zig.sh

    - name: Cross-Compile LibFFI
      run: bash scripts/setup/cross-compile-libffi.sh

    - name: Build Standard Shared Libraries
      run: bash scripts/build-shared-libs.sh

    - name: Build UI Libraries (LVGL, SDL2, Nuklear)
      run: bash scripts/build-ui-libs.sh

    - name: Build Swalang Interpreter
      run: bash scripts/build-interpreter.sh

    - name: Build VSCode Extension
      run: |
        cd vscode-ext
        npm install
        npm run build
        npm run package
        cd ..

    - name: Package Release Artifacts
      run: |
        mkdir -p release_artifacts
        
        # Package Linux Build
        tar -czvf release_artifacts/swalang-linux-x86_64.tar.gz -C builds/linux-x86_64 .
        
        # Package Windows Build
        cd builds/win64-x86_64
        zip -r ../../release_artifacts/swalang-windows-x86_64.zip ./*
        cd ../..
        
        # Copy VSCode Extension into the release artifacts
        cp vscode-ext/*.vsix release_artifacts/

    - name: Upload Artifacts to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: swalang-build-artifacts
        path: release_artifacts/*

    - name: Publish to GitHub Releases (Tags Only)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release_artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}