name: Build and Release Swalang

on:
  push:
    tags:
      - 'v*' # Triggers workflow when a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Swalang Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'

      - name: Setup Zig (For Cross-Compilation)
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential curl tar zip

      - name: Build Shared Extensions (C Libraries)
        run: |
          chmod +x scripts/build-shared-libs.sh
          bash scripts/build-shared-libs.sh

      - name: Build Swalang Interpreter
        run: |
          chmod +x scripts/setup/cross-compile-libffi.sh
          chmod +x scripts/build-interpreter.sh
          bash scripts/build-interpreter.sh

      - name: Package Artifacts
        run: |
          cd builds
          zip -r swalang-linux-x86_64.zip linux-x86_64/
          zip -r swalang-windows-x86_64.zip win64-x86_64/

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swalang-linux
          path: builds/swalang-linux-x86_64.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swalang-windows
          path: builds/swalang-windows-x86_64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            builds/swalang-linux-x86_64.zip
            builds/swalang-windows-x86_64.zip
          draft: false
          prerelease: false
          generate_release_notes: true