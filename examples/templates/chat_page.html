<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pylearn Chat | #{{ room_id }}</title>
    
    <!-- Load Alpine.js and HTMX from CDN -->
    <script src="https://unpkg.com/alpinejs@3.10.5/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 200px; border-right: 1px solid #ccc; padding: 1rem; background: #f4f4f4; }
        #sidebar h2 { margin-top: 0; }
        #sidebar a { display: block; padding: 0.5rem; text-decoration: none; color: #007bff; border-radius: 4px; }
        #sidebar a:hover { background: #e9ecef; }
        #main-chat { flex-grow: 1; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; padding: 1rem; overflow-y: auto; }
        #messages p { margin: 0 0 0.5rem; }
        #form-container { padding: 1rem; border-top: 1px solid #ccc; background: #f9f9f9; }
        form { display: flex; }
        input { flex-grow: 1; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 0.5rem 1rem; margin-left: 0.5rem; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Rooms</h2>
        {% for room in available_rooms %}
            <a href="/chat/{{ room }}">{{ room }}</a>
        {% endfor %}
    </div>

    <div id="main-chat"
         x-data="chatApp()"
         x-init="connect()"
         hx-ext="ws" 
         ws-connect="/chat_ws/{{ room_id }}">

        <h1>Chat Room: #{{ room_id }}</h1>
        
        <!-- This is where chat messages will be inserted by HTMX -->
        <div id="messages">
            <p><i>Connecting to chat...</i></p>
        </div>

        <div id="form-container">
            <!-- This form sends messages over the WebSocket connection -->
            <form id="form" ws-send>
                <input name="message" x-model="newMessage" placeholder="Type a message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <!-- Alpine.js component to manage the form state -->
    <script>
        function chatApp() {
            return {
                newMessage: '',
                // When the form is submitted by HTMX ws-send, it automatically
                // clears the input. We can add more logic here if needed.
            }
        }
        function connect() {
            
        }
    </script>

</body>
</html>
