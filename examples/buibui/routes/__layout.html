{# routes/__layout.html - uses pylearn_custom syntax #}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default:"My Pylearn App" }}</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        header, footer { background-color: #333; color: white; padding: 10px; text-align: center; }
        main { background-color: white; padding: 20px; margin-top: 10px; margin-bottom: 10px; border-radius: 5px; }
        nav a { margin-right: 15px; color: #eee; text-decoration: none; }
        nav a:hover { color: white; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/services/">Services</a>
            <a href="/nonexistent/">404 Test</a>
        </nav>
        <h2>{{ title|default:"Pylearn Site" }}</h2>
    </header>
    <main>
        {{ content|safe }}
    </main>
    <footer>
        <p>© Pylearn Framework Test</p>
    </footer>
</body>
</html>
