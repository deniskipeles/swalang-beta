{# templates/errors/500.html - uses pylearn_custom syntax #}
<!DOCTYPE html>
<html><head><title>{{ title|default:"Server Error" }}</title></head><body>
<h1>{{ error_code }}: {{ title }}</h1>
<p>We encountered an internal server error. Please try again later.</p>
<p><i>Details: {{ message }}</i></p> {# Only show details in dev mode ideally #}
<p><a href="/">Go to Homepage</a></p>
</body></html>
